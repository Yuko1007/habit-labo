<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ビブス管理アプリ</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 16px;
            min-height: 100vh;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
            padding: 24px;
        }
        h1 {
            font-size: 28px;
            margin-bottom: 8px;
            text-align: center;
            color: #333;
        }
        .subtitle {
            text-align: center;
            color: #999;
            font-size: 14px;
            margin-bottom: 24px;
        }
        /* ログイン画面 */
        .login-screen {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .login-screen.hidden {
            display: none;
        }
        .login-label {
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }
        .login-input {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            width: 100%;
        }
        .login-btn {
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }
        .user-info {
            text-align: center;
            padding: 12px;
            background: #f0f4ff;
            border-radius: 8px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 14px;
        }
        .user-info span {
            font-weight: 600;
            color: #667eea;
        }
        .logout-btn {
            padding: 6px 12px;
            background: #fff;
            color: #667eea;
            border: 1px solid #667eea;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.2s;
        }
        .logout-btn:hover {
            background: #f0f4ff;
        }
        /* メイン画面 */
        .main-screen {
            display: none;
        }
        .main-screen.active {
            display: block;
        }
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            border-bottom: 2px solid #e0e0e0;
            overflow-x: auto;
        }
        .tab-btn {
            padding: 12px 16px;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            color: #999;
            border-bottom: 3px solid transparent;
            white-space: nowrap;
            transition: all 0.3s;
        }
        .tab-btn.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
            animation: fadeIn 0.3s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .bibs-list {
            margin-bottom: 24px;
        }
        .bibs-group {
            margin-bottom: 20px;
        }
        .bibs-group-title {
            font-size: 13px;
            font-weight: 700;
            color: #666;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .bib-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: #f9f9f9;
            border-radius: 8px;
            margin-bottom: 8px;
            border: 1px solid #e8e8e8;
            transition: all 0.2s;
        }
        .bib-item.selected {
            background: #f0f4ff;
            border-color: #667eea;
        }
        .bib-checkbox {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #667eea;
        }
        .bib-label {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .bib-name {
            font-weight: 600;
            font-size: 14px;
            color: #333;
        }
        .bib-status {
            font-size: 12px;
            color: #999;
        }
        .status-selector {
            display: flex;
            gap: 6px;
        }
        .status-btn {
            padding: 6px 12px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.2s;
        }
        .status-btn:hover {
            border-color: #667eea;
            color: #667eea;
        }
        .status-btn.selected {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 12px;
        }
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }
        .submit-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        .completion-msg {
            text-align: center;
            padding: 16px;
            background: #e8f5e9;
            border-radius: 8px;
            color: #2e7d32;
            font-weight: 600;
            display: none;
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .completion-msg.show {
            display: block;
        }
        .error-msg {
            padding: 12px;
            background: #ffebee;
            color: #c62828;
            border-radius: 8px;
            margin-bottom: 12px;
            display: none;
            font-weight: 500;
        }
        .error-msg.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- ログイン画面 -->
        <div class="login-screen" id="loginScreen">
            <h1>📋 ビブス報告</h1>
            <p class="subtitle">お名前を入力してください</p>
            <div>
                <div class="login-label">お名前</div>
                <input type="text" class="login-input" id="nameInput" placeholder="例: 田中太郎" onkeypress="if(event.key==='Enter') login()">
            </div>
            <button class="login-btn" onclick="login()">ログイン</button>
        </div>

        <!-- メイン画面 -->
        <div class="main-screen" id="mainScreen">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                <div>
                    <h1>📋 ビブス報告</h1>
                    <div class="subtitle" id="today-date"></div>
                </div>
            </div>

            <div class="user-info">
                <span id="userNameDisplay"></span>
                <button class="logout-btn" onclick="logout()">ログアウト</button>
            </div>

            <div class="tabs" id="tabs"></div>

            <div class="error-msg" id="errorMsg"></div>

            <div id="tabContents"></div>

            <button class="submit-btn" id="submitBtn">送信する</button>
            <div class="completion-msg" id="completionMsg">✅ 報告ありがとうございました！</div>
        </div>
    </div>

    <script>
        const SHEET_ID = '1aFA5tzLrmGFPMyZbAQvLSVwHGT7SVvEdoGTNjG3s_eo';
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/d/YOUR_SCRIPT_ID/usercopy'; // 後で設定

        const teams = [
            { name: 'U-15', people: 11, colors: ['水色', 'ピンク'] },
            { name: 'U-14', people: 13, colors: ['オレンジ', '灰色', '黒'] },
            { name: 'U-13', people: 12, colors: ['黄色', '黄色（古）'] }
        ];

        let currentUser = null;
        let selectedData = {};

        function getToday() {
            const d = new Date();
            return d.getFullYear() + '/' + String(d.getMonth() + 1).padStart(2, '0') + '/' + String(d.getDate()).padStart(2, '0');
        }

        function login() {
            const name = document.getElementById('nameInput').value.trim();
            if (!name) {
                alert('お名前を入力してください');
                return;
            }
            currentUser = name;
            localStorage.setItem('userName', name);
            showMainScreen();
        }

        function logout() {
            if (confirm('ログアウトしますか？')) {
                currentUser = null;
                localStorage.removeItem('userName');
                location.reload();
            }
        }

        function showMainScreen() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('mainScreen').classList.add('active');
            document.getElementById('userNameDisplay').textContent = currentUser;
            document.getElementById('today-date').textContent = getToday();
            initUI();
        }

        function initUI() {
            const tabsContainer = document.getElementById('tabs');
            const contentsContainer = document.getElementById('tabContents');

            teams.forEach((team, idx) => {
                const btn = document.createElement('button');
                btn.className = `tab-btn ${idx === 0 ? 'active' : ''}`;
                btn.textContent = team.name;
                btn.onclick = () => switchTab(idx);
                tabsContainer.appendChild(btn);

                const content = document.createElement('div');
                content.className = `tab-content ${idx === 0 ? 'active' : ''}`;
                content.id = `tab-${team.name}`;
                content.innerHTML = renderTeamContent(team);
                contentsContainer.appendChild(content);

                selectedData[team.name] = {};
                team.colors.forEach(color => {
                    selectedData[team.name][color] = {};
                    for (let i = 1; i <= team.people; i++) {
                        selectedData[team.name][color][i] = null;
                    }
                });
            });

            document.getElementById('submitBtn').onclick = submitData;
        }

        function renderTeamContent(team) {
            let html = '<div class="bibs-list">';
            team.colors.forEach(color => {
                html += `<div class="bibs-group">`;
                html += `<div class="bibs-group-title">${color}ビブス</div>`;
                for (let i = 1; i <= team.people; i++) {
                    html += `
                        <div class="bib-item" id="item-${team.name}-${color}-${i}">
                            <input type="checkbox" class="bib-checkbox" data-team="${team.name}" data-color="${color}" data-number="${i}">
                            <div class="bib-label">
                                <div class="bib-name">№${i}</div>
                                <div class="bib-status" data-status="${team.name}-${color}-${i}">未選択</div>
                            </div>
                            <div class="status-selector">
                                <button class="status-btn" onclick="setStatus('${team.name}', '${color}', ${i}, '持ち帰り')" type="button">持ち帰り</button>
                                <button class="status-btn" onclick="setStatus('${team.name}', '${color}', ${i}, '倉庫')" type="button">倉庫</button>
                            </div>
                        </div>
                    `;
                }
                html += `</div>`;
            });
            html += `</div>`;
            return html;
        }

        function switchTab(idx) {
            document.querySelectorAll('.tab-btn').forEach((b, i) => {
                b.classList.toggle('active', i === idx);
            });
            document.querySelectorAll('.tab-content').forEach((c, i) => {
                c.classList.toggle('active', i === idx);
            });
        }

        function setStatus(team, color, number, status) {
            const displayValue = status === '持ち帰り' ? `持ち帰り（${currentUser}）` : status;
            selectedData[team][color][number] = status;

            const statusEl = document.querySelector(`[data-status="${team}-${color}-${number}"]`);
            const itemEl = document.getElementById(`item-${team}-${color}-${number}`);
            const buttons = itemEl.querySelectorAll('.status-btn');

            statusEl.textContent = displayValue;
            itemEl.classList.add('selected');

            buttons.forEach(btn => {
                btn.classList.toggle('selected', btn.textContent === status);
            });
        }

        async function submitData() {
            const btn = document.getElementById('submitBtn');
            const errorMsg = document.getElementById('errorMsg');

            btn.disabled = true;
            btn.textContent = '送信中...';
            errorMsg.classList.remove('show');

            try {
                const today = getToday();
                const rows = [];

                teams.forEach(team => {
                    team.colors.forEach(color => {
                        for (let i = 1; i <= team.people; i++) {
                            const status = selectedData[team.name][color][i];
                            if (status) {
                                rows.push({
                                    team: team.name,
                                    date: today,
                                    color: color,
                                    number: i,
                                    status: status,
                                    name: status === '持ち帰り' ? currentUser : ''
                                });
                            }
                        }
                    });
                });

                if (rows.length === 0) {
                    errorMsg.textContent = '❌ 報告するビブスを選択してください';
                    errorMsg.classList.add('show');
                    btn.disabled = false;
                    btn.textContent = '送信する';
                    return;
                }

                // Google Apps Script に送信
                const response = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ data: rows })
                });

                document.getElementById('completionMsg').classList.add('show');
                btn.style.display = 'none';

                setTimeout(() => {
                    location.reload();
                }, 2500);

            } catch (err) {
                errorMsg.textContent = '❌ ' + err.message;
                errorMsg.classList.add('show');
                btn.disabled = false;
                btn.textContent = '送信する';
            }
        }

        // 初期化
        window.addEventListener('DOMContentLoaded', () => {
            const savedName = localStorage.getItem('userName');
            if (savedName) {
                currentUser = savedName;
                showMainScreen();
            }
        });
    </script>
</body>
</html>
